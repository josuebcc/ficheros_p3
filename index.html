<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Práctica 3 DASH - Parte 2.3 (Métricas)</title>
    <script src="dash.all.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        video { width: 800px; height: 450px; background: #000; border-radius: 8px; }
        .metrics { margin-top: 20px; text-align: left; display: inline-block; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; min-width: 300px; }
        .metrics p { margin: 5px 0; font-family: monospace; }
        .metrics span { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Mi propio Streaming DASH con Métricas</h2>
        
        <video class="dashjs-player" autoplay controls preload="auto" muted></video>

        <div class="metrics">
            <p>Video Bitrate: <span id="bitrate"></span> Kbps</p>
            <p>Video Buffer: <span id="buffer"></span> seconds</p>
            <p>Video Representation: <span id="representation"></span></p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            init();
        });

        function init(){
            var video, player, mpd_url;
            
            // Apuntamos a tu propio manifiesto generado con Bento4 [cite: 145]
            mpd_url = "../output/stream.mpd";
            video = document.querySelector("video");
            
            player = dashjs.MediaPlayer().create(); [cite: 147]
            player.initialize(video, mpd_url, true); [cite: 148]

            // Intervalo para actualizar métricas cada 500ms 
            var eventPoller = setInterval(function() {
                var streamInfo = player.getActiveStream().getStreamInfo(); [cite: 153]
                var dashMetrics = player.getDashMetrics(); [cite: 154]
                var dashAdapter = player.getDashAdapter(); [cite: 155]

                if (dashMetrics && streamInfo) {
                    const periodIdx = streamInfo.index; [cite: 158]
                    
                    // Extraer representación y nivel de buffer [cite: 159, 160]
                    var repSwitch = dashMetrics.getCurrentRepresentationSwitch('video', true);
                    var bufferLevel = dashMetrics.getCurrentBufferLevel('video', true);
                    
                    // Calcular bitrate en Kbps [cite: 161, 162]
                    var bitrate = repSwitch ? Math.round(dashAdapter.getBandwidthForRepresentation(repSwitch.to, periodIdx) / 1000) : NaN;

                    // Pintar los datos en el HTML [cite: 163, 164]
                    document.getElementById('buffer').innerText = bufferLevel.toFixed(3) + " secs";
                    document.getElementById('bitrate').innerText = bitrate;
                    document.getElementById('representation').innerText = repSwitch ? repSwitch.to : "Buscando...";
                }
            }, 500);

            // Detener el poller al terminar el vídeo [cite: 149-151]
            player.on(dashjs.MediaPlayer.events["PLAYBACK_ENDED"], function() {
                clearInterval(eventPoller);
            });
        }
    </script>
</body>
</html>
